<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Sistema Noé</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white;
           min-height: 100vh; display: flex; align-items: center; justify-content: center;
           padding: 1rem; }
    .container { text-align: center; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; line-height: 1.5; }
    button { background: #3b82f6; color: white; border: none; padding: 0.75rem 1.5rem;
             border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão com a internet. Seus dados estão seguros — assim que voltar online, tudo será sincronizado.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
